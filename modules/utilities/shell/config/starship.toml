# Use Nerd Fonts symbols for Git status
[git_branch]
symbol = "Όεξ "  # Nerd Font GitHub logo
style = "bold green"
format = "[$symbol$branch]($style) "

[git_commit]
commit_hash_length = 7
tag_symbol = "ΎΑτ "
style = "bold yellow"
format = "[$symbol$commit]($style) "

[git_state]
format = '[\($state\)]($style) '
style = "bold red"
rebase = "Όεπ REBASING"
merge = "Όεπ MERGING"
cherry_pick = "ΌΛδ CHERRY-PICKING"
bisect = "Όεα BISECTING"
revert = "ΎΣχ REVERTING"

[git_status]
# format = '([\[$all_status$ahead_behind\]]($style)) '
format = '([$all_status$ahead_behind]($style) )'
style = "bold green"
staged = '+'
modified = 'ΎΣΕ'
deleted = 'ΎΣπ'
renamed = 'ΎΣγ'
untracked = 'ΎΕρ'
conflicted = 'Όεπ'
ahead = 'έΗΣ'
behind = 'έΗΥ'

