# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  auto_save.session:
    global: false
  bindings.commands:
    global:
      normal:
        ',,': download-open ;; download-clear
        <Space>: 'cmd-set-text :'
        P: :spawn --userscript qute-pass --password-only
        p: :spawn --userscript qute-pass
  colors.downloads.system.fg:
    global: rgb
  colors.statusbar.caret.bg:
    global: '#282a36'
  colors.statusbar.insert.fg:
    global: '#ffffff'
  colors.statusbar.normal.bg:
    global: '#282a36'
  colors.webpage.bg:
    global: white
  completion.open_categories:
    global:
    - quickmarks
    - searchengines
    - bookmarks
    - history
    - filesystem
  content.blocking.method:
    global: both
  content.cookies.store:
    global: true
  content.desktop_capture:
    https://app.zoom.us: true
    https://claude.ai: true
  content.geolocation:
    https://www.speedtest.net: false
  content.headers.do_not_track:
    global: false
  content.headers.user_agent:
    global: Mozilla/5.0 ({os_info}) AppleWebKit/{webkit_version} (KHTML, like Gecko)
      {upstream_browser_key}/{upstream_browser_version_short} Safari/{webkit_version}
  content.javascript.clipboard:
    https://chatgpt.com: access-paste
    https://claude.ai: access-paste
    https://docs.google.com: access-paste
    https://duckduckgo.com: access-paste
    https://github.com: access-paste
    https://google.github.io: access-paste
    https://patorjk.com: access-paste
    https://wiki.hypr.land: access-paste
  content.media.audio_capture:
    https://app.slack.com: true
    https://app.zoom.us: true
    https://chatgpt.com: true
    https://claude.ai: true
  content.media.audio_video_capture:
    https://app.zoom.us: true
    https://diagnostics.simplepractice.com: true
    https://video.simplepractice.com: true
  content.media.video_capture:
    https://app.slack.com: true
    https://app.zoom.us: true
  content.mouse_lock:
    https://www.figma.com: true
  content.notifications.enabled:
    https://app.zoom.us: true
    https://calendar.google.com: false
    https://www.exchangetuts.com: false
    https://www.netflix.com: false
    https://www.youtube.com: false
  content.register_protocol_handler:
    https://calendar.google.com?cid=%25s: true
    https://mail.google.com?extsrc=mailto&url=%25s: true
  downloads.position:
    global: bottom
  editor.command:
    global:
    - nvim
    - -f
    - '{file}'
    - -c
    - normal {line}G{column0}l
  hints.chars:
    global: asdfghjkl
  hints.leave_on_load:
    global: false
  hints.mode:
    global: letter
  hints.scatter:
    global: true
  input.insert_mode.auto_load:
    global: false
  input.spatial_navigation:
    global: false
  prompt.radius:
    global: 8
  qt.highdpi:
    global: false
  qt.workarounds.disable_hangouts_extension:
    global: true
  scrolling.smooth:
    global: true
  statusbar.padding:
    global:
      bottom: 6
      left: 8
      right: 8
      top: 6
  statusbar.position:
    global: bottom
  statusbar.show:
    global: in-mode
  statusbar.widgets:
    global:
    - keypress
    - search_match
    - url
  tabs.position:
    global: top
  tabs.show:
    global: switching
  tabs.title.alignment:
    global: center
  tabs.title.elide:
    global: none
  tabs.title.format:
    global: '{audio} {current_title}'
  tabs.tooltips:
    global: true
  tabs.width:
    global: 15%
  url.default_page:
    global: home.panos.wiki
  url.incdec_segments:
    global:
    - path
    - query
  url.searchengines:
    global:
      DEFAULT: https://duckduckgo.com/?q={}
      aw: https://wiki.archlinux.org/?search={}
      np: https://search.nixos.org/packages?&query={}
      you: https://www.youtube.com/results?search_query={}
  url.start_pages:
    global: home.panos.wiki
  window.transparent:
    global: true
